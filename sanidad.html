<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Sanidad</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Sanidad</div><div class="page-sub">Vacunas · tratamientos · inventario</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-trat')"><i class="ti ti-pill"></i> Tratamiento</button>
      <button class="btn btn-primary" onclick="openModal('modal-vac')"><i class="ti ti-vaccine"></i> Aplicar vacuna</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>
    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Plan sanitario</div><div class="card-sub" id="plan-sub">—</div></div></div>
        <div style="overflow-x:auto;"><table class="tbl" id="tbl-vac"><thead><tr><th>Fecha</th><th>Lote</th><th>Vacuna</th><th>Vía</th><th>Aplicador</th><th>Estado</th><th></th></tr></thead><tbody></tbody></table></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Tratamientos activos</div><div class="card-sub" id="trat-sub">—</div></div></div>
        <div class="card-body" id="trat-body"></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Inventario sanitario</div><div class="card-sub" id="inv-sub">—</div></div>
        <button class="btn btn-secondary btn-sm" onclick="openModal('modal-inv')"><i class="ti ti-plus"></i> Producto</button>
      </div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-inv"><thead><tr><th>Producto</th><th>Tipo</th><th>Presentación</th><th>Stock</th><th>Mínimo</th><th>Vencimiento</th><th>Estado</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-vac">
  <div class="modal" style="max-width:560px;">
    <div class="modal-head"><div><div class="modal-ttl">Aplicar vacuna</div></div><button class="modal-close" onclick="closeModal('modal-vac')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="vc-fecha"></div><div class="form-group"><label class="form-label">Lote</label><select class="form-input" id="vc-lote"></select></div></div>
      <div class="form-group"><label class="form-label">Vacuna</label><input type="text" class="form-input" id="vc-vacuna" placeholder="Newcastle La Sota"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Vía</label><select class="form-input" id="vc-via"><option>ocular</option><option>agua</option><option>subcutánea</option><option>aerosol</option><option>spray</option></select></div><div class="form-group"><label class="form-label">Dosis</label><input type="text" class="form-input" id="vc-dosis" placeholder="1 dosis/ave"></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Lote vacuna</label><input type="text" class="form-input" id="vc-lotev"></div><div class="form-group"><label class="form-label">Aplicador</label><input type="text" class="form-input" id="vc-aplic"></div></div>
      <div class="form-group"><label class="form-label">Estado</label><select class="form-input" id="vc-estado"><option value="aplicada">Aplicada</option><option value="pendiente">Pendiente · programada</option></select></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-vac')">Cancelar</button><button class="btn btn-primary" onclick="guardarVac()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-trat">
  <div class="modal" style="max-width:560px;">
    <div class="modal-head"><div><div class="modal-ttl">Nuevo tratamiento</div></div><button class="modal-close" onclick="closeModal('modal-trat')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha inicio</label><input type="date" class="form-input" id="t-fecha"></div><div class="form-group"><label class="form-label">Lote</label><select class="form-input" id="t-lote"></select></div></div>
      <div class="form-group"><label class="form-label">Medicamento</label><input type="text" class="form-input" id="t-med" placeholder="Enrofloxacina 10%"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Dosis</label><input type="text" class="form-input" id="t-dosis" placeholder="1mL/L agua"></div><div class="form-group"><label class="form-label">Días tratamiento</label><input type="number" class="form-input" id="t-dias" value="5"></div></div>
      <div class="form-group"><label class="form-label">Diagnóstico/motivo</label><textarea class="form-input" id="t-diag" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-trat')">Cancelar</button><button class="btn btn-primary" onclick="guardarTrat()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-inv">
  <div class="modal" style="max-width:520px;">
    <div class="modal-head"><div><div class="modal-ttl">Producto al inventario</div></div><button class="modal-close" onclick="closeModal('modal-inv')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Producto</label><input type="text" class="form-input" id="i-prod"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><select class="form-input" id="i-tipo"><option>Vacuna</option><option>Antibiótico</option><option>Antiparasitario</option><option>Vitamina</option><option>Desinfectante</option><option>Otro</option></select></div><div class="form-group"><label class="form-label">Presentación</label><input type="text" class="form-input" id="i-pres" placeholder="1L frasco"></div></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Stock</label><input type="number" class="form-input" id="i-stock"></div>
        <div class="form-group"><label class="form-label">Mínimo</label><input type="number" class="form-input" id="i-min" value="2"></div>
        <div class="form-group"><label class="form-label">Vencimiento</label><input type="date" class="form-input" id="i-venc"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-inv')">Cancelar</button><button class="btn btn-primary" onclick="guardarInv()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const vac = store.list('vacunas');
  const tratamientos = store.list('tratamientos', { estado: 'activo' });
  const inv = store.list('inventarioSanidad');
  const pendientes = vac.filter(v => v.estado === 'pendiente').length;
  const aplicadas = vac.filter(v => v.estado === 'aplicada').length;
  const stockBajo = inv.filter(i => i.stock <= i.minimo).length;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-vaccine"></i></div><span class="ki-trend up"><i class="ti ti-check"></i></span></div><div class="ki-label">Vacunas aplicadas</div><div class="ki-num num-mono">${aplicadas}<span></span></div><div class="ki-context">Total registradas</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg ${pendientes?'w':'g'}"><i class="ti ti-clock"></i></div></div><div class="ki-label">Pendientes</div><div class="ki-num num-mono">${pendientes}<span></span></div><div class="ki-context">${pendientes?'Requieren aplicación':'Todas aplicadas'}</div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-pill"></i></div></div><div class="ki-label">Tratamientos activos</div><div class="ki-num num-mono">${tratamientos.length}<span></span></div><div class="ki-context">${tratamientos.length?'En curso':'Sin tratamientos'}</div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg ${stockBajo?'r':'g'}"><i class="ti ti-package"></i></div></div><div class="ki-label">Inventario</div><div class="ki-num num-mono">${inv.length}<span>items</span></div><div class="ki-context">${stockBajo?stockBajo+' bajo mínimo':'Stock óptimo'}</div></div>`;

  // Plan sanitario
  document.getElementById('plan-sub').textContent = `${vac.length} aplicaciones registradas`;
  const tbody = document.querySelector('#tbl-vac tbody');
  if (!vac.length) tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-3);padding:40px;">Sin vacunas registradas</td></tr>';
  else tbody.innerHTML = vac.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(v => {
    const lote = store.get('lotes', v.loteId);
    const isPend = v.estado === 'pendiente';
    return `<tr>
      <td class="num-mono" style="color:${isPend?'var(--amber-d)':'var(--text-3)'};font-weight:${isPend?700:500}">${fmtFecha(v.fecha,{short:true})}</td>
      <td style="font-weight:600">${escapeHTML(lote?.nombre||'?')}</td>
      <td>${escapeHTML(v.vacuna||'')}</td>
      <td><span class="pill" style="background:var(--surface-3)">${escapeHTML(v.via||'—')}</span></td>
      <td>${escapeHTML(v.aplicador||'—')}</td>
      <td><span class="pill ${isPend?'pill-warn':'pill-ok'}"><span class="sdot ${isPend?'w':'g'}"></span> ${isPend?'Pendiente':'Aplicada'}</span></td>
      <td>${isPend?`<button class="btn btn-ghost btn-sm" onclick="aplicarVac('${v.id}')"><i class="ti ti-check"></i></button>`:''}<button class="btn btn-ghost btn-sm" onclick="eliminarVac('${v.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');

  // Tratamientos
  document.getElementById('trat-sub').textContent = `${tratamientos.length} en curso`;
  document.getElementById('trat-body').innerHTML = tratamientos.length ? tratamientos.map(t => {
    const lote = store.get('lotes', t.loteId);
    const dias = Math.floor((new Date() - new Date(t.fechaInicio))/(1000*60*60*24)) + 1;
    const pct = Math.min(100, dias/t.dias*100);
    return `<div style="padding:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
        <div><div style="font-weight:700;font-size:14px;font-family:var(--font-display);">${escapeHTML(t.medicamento)}</div><div style="font-size:12px;color:var(--text-3);font-weight:500;margin-top:2px;">${escapeHTML(lote?.nombre||'?')} · ${escapeHTML(t.dosis||'')}</div></div>
        <span class="pill pill-warn"><span class="sdot w"></span> Día ${dias}/${t.dias}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:var(--amber);"></div></div>
      ${t.diagnostico?`<div style="font-size:11.5px;color:var(--text-3);margin-top:8px;font-weight:500;font-style:italic;">${escapeHTML(t.diagnostico)}</div>`:''}
      <div style="margin-top:10px;display:flex;gap:6px;"><button class="btn btn-ghost btn-sm" onclick="finalizarTrat('${t.id}')"><i class="ti ti-check"></i> Finalizar</button></div>
    </div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin tratamientos activos</div></div>';

  // Inventario
  document.getElementById('inv-sub').textContent = `${inv.length} productos · ${stockBajo} bajo mínimo`;
  const tbodyI = document.querySelector('#tbl-inv tbody');
  if (!inv.length) tbodyI.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-3);padding:40px;">Sin inventario</td></tr>';
  else tbodyI.innerHTML = inv.map(i => {
    const isBajo = i.stock <= i.minimo;
    const venc = new Date(i.vencimiento);
    const diasVenc = Math.floor((venc - new Date())/(1000*60*60*24));
    const isPorVencer = diasVenc < 60;
    return `<tr>
      <td style="font-weight:600">${escapeHTML(i.producto)}</td>
      <td><span class="pill" style="background:var(--surface-3)">${escapeHTML(i.tipo)}</span></td>
      <td>${escapeHTML(i.presentacion||'')}</td>
      <td class="num-mono" style="font-weight:700;color:${isBajo?'var(--terracotta)':'var(--text)'}">${i.stock}</td>
      <td class="num-mono" style="color:var(--text-3)">${i.minimo}</td>
      <td class="num-mono" style="color:${isPorVencer?'var(--amber-d)':'var(--text-3)'}">${fmtFecha(i.vencimiento,{short:true})} ${isPorVencer?'<i class="ti ti-alert-triangle" style="font-size:13px"></i>':''}</td>
      <td><span class="pill ${isBajo?'pill-warn':'pill-ok'}"><span class="sdot ${isBajo?'w':'g'}"></span> ${isBajo?'Stock bajo':'OK'}</span></td>
    </tr>`;
  }).join('');
}

function abrirModalVac() {
  document.getElementById('vc-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('vc-lote').innerHTML = store.list('lotes',{estado:'activo'}).map(l=>`<option value="${l.id}">${l.nombre}</option>`).join('');
  ['vc-vacuna','vc-dosis','vc-lotev','vc-aplic'].forEach(id=>document.getElementById(id).value='');
}
function abrirModalTrat() {
  document.getElementById('t-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('t-lote').innerHTML = store.list('lotes',{estado:'activo'}).map(l=>`<option value="${l.id}">${l.nombre}</option>`).join('');
  ['t-med','t-dosis','t-diag'].forEach(id=>document.getElementById(id).value='');
}
function abrirModalInv() {
  ['i-prod','i-pres','i-stock'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('i-min').value = '2';
}

document.getElementById('modal-vac').addEventListener('click', e => { if(e.target.classList.contains('modal-overlay')) {} });
['modal-vac','modal-trat','modal-inv'].forEach(id=>{
  const ob = document.getElementById(id);
  ob._origOpen = ob.classList.add;
});

// Override openModal para llenar antes
const _orig = openModal;
window.openModal = function(id) {
  if (id==='modal-vac') abrirModalVac();
  else if (id==='modal-trat') abrirModalTrat();
  else if (id==='modal-inv') abrirModalInv();
  _orig(id);
};

function guardarVac() {
  const data = {
    fecha: document.getElementById('vc-fecha').value,
    loteId: document.getElementById('vc-lote').value,
    vacuna: document.getElementById('vc-vacuna').value.trim(),
    via: document.getElementById('vc-via').value,
    dosis: document.getElementById('vc-dosis').value.trim(),
    loteVacuna: document.getElementById('vc-lotev').value.trim(),
    aplicador: document.getElementById('vc-aplic').value.trim() || auth.current()?.nombre || '',
    estado: document.getElementById('vc-estado').value
  };
  if (!data.vacuna || !data.loteId) { toast('Vacuna y lote requeridos','danger'); return; }
  store.create('vacunas', data);
  logActivity({ texto:`<strong>${data.aplicador}</strong> ${data.estado==='aplicada'?'aplicó':'programó'} vacuna <strong>${escapeHTML(data.vacuna)}</strong>`, tipo:'g', icono:'vaccine' });
  closeModal('modal-vac'); toast('Vacuna registrada','success'); renderPage();
}

function aplicarVac(id) {
  store.update('vacunas', id, { estado:'aplicada' });
  toast('Marcada como aplicada','success'); renderPage();
}

function eliminarVac(id) {
  if (!confirm('¿Eliminar?')) return;
  store.delete('vacunas', id); toast('Eliminada','info'); renderPage();
}

function guardarTrat() {
  const data = {
    fechaInicio: document.getElementById('t-fecha').value,
    loteId: document.getElementById('t-lote').value,
    medicamento: document.getElementById('t-med').value.trim(),
    dosis: document.getElementById('t-dosis').value.trim(),
    dias: Number(document.getElementById('t-dias').value)||5,
    diagnostico: document.getElementById('t-diag').value.trim(),
    estado: 'activo'
  };
  if (!data.medicamento || !data.loteId) { toast('Medicamento y lote requeridos','danger'); return; }
  store.create('tratamientos', data);
  closeModal('modal-trat'); toast('Tratamiento iniciado','success'); renderPage();
}

function finalizarTrat(id) {
  if (!confirm('¿Finalizar tratamiento?')) return;
  store.update('tratamientos', id, { estado:'finalizado' });
  toast('Finalizado','success'); renderPage();
}

function guardarInv() {
  const data = {
    producto: document.getElementById('i-prod').value.trim(),
    tipo: document.getElementById('i-tipo').value,
    presentacion: document.getElementById('i-pres').value.trim(),
    stock: Number(document.getElementById('i-stock').value)||0,
    minimo: Number(document.getElementById('i-min').value)||2,
    vencimiento: document.getElementById('i-venc').value
  };
  if (!data.producto) { toast('Producto requerido','danger'); return; }
  store.create('inventarioSanidad', data);
  closeModal('modal-inv'); toast('Producto agregado','success'); renderPage();
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
