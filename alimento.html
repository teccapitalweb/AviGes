<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Alimento</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Alimento</div><div class="page-sub">Inventario · consumo · entradas</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-primary" onclick="abrirEntrada()"><i class="ti ti-plus"></i> Nueva entrada</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>
    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Stock por galpón</div><div class="card-sub">Días restantes estimados</div></div></div>
        <div class="card-body" id="stock-body"></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Consumo vs estándar</div><div class="card-sub" id="cons-sub">—</div></div></div>
        <div class="card-body"><div class="chart-wrap" style="height:220px;"><canvas id="chartConsumo"></canvas></div></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Entradas recientes</div><div class="card-sub" id="ent-count">—</div></div></div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-ent"><thead><tr><th>Fecha</th><th>Galpón</th><th>Tipo</th><th>Sacos</th><th>Kg total</th><th>$/Ton</th><th>Total</th><th>Proveedor</th><th></th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-ent">
  <div class="modal" style="max-width:580px;">
    <div class="modal-head"><div><div class="modal-ttl">Entrada de alimento</div></div><button class="modal-close" onclick="closeModal('modal-ent')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="e-fecha"></div><div class="form-group"><label class="form-label">Galpón</label><select class="form-input" id="e-galpon"></select></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Tipo de alimento</label><select class="form-input" id="e-tipo"><option>Iniciador</option><option>Crecimiento</option><option>Finalizador Fase 1</option><option>Finalizador Fase 2</option><option>Postura producción</option><option>Inicio postura</option><option>Otro</option></select></div><div class="form-group"><label class="form-label">Proveedor</label><input type="text" class="form-input" id="e-prov"></div></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Sacos</label><input type="number" class="form-input" id="e-sacos" oninput="calcEnt()"></div>
        <div class="form-group"><label class="form-label">Kg/saco</label><input type="number" class="form-input" id="e-kg" value="40" oninput="calcEnt()"></div>
        <div class="form-group"><label class="form-label">$/Tonelada</label><input type="number" class="form-input" id="e-precio" oninput="calcEnt()"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Kg totales</label><input type="text" class="form-input" id="e-total-kg" readonly style="background:var(--surface-3);font-weight:700;"></div>
        <div class="form-group"><label class="form-label">Total MXN</label><input type="text" class="form-input" id="e-total" readonly style="background:var(--surface-3);font-weight:700;color:var(--primary);font-family:var(--font-display);"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-ent')">Cancelar</button><button class="btn btn-primary" onclick="guardarEntrada()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const galpones = store.list('galpones', { activo: true });
  const entradas = store.list('entradasAlimento');
  const totalSacos = entradas.reduce((s,e)=>s+(e.sacos||0),0);
  const totalKg = entradas.reduce((s,e)=>s+(e.kgTotal||0),0);
  const totalGasto = entradas.reduce((s,e)=>s+(e.total||0),0);
  let stockTotal = 0, alertas = 0;
  galpones.forEach(g => { stockTotal += calc.stockAlimentoGalpon(g.id); const d = calc.diasStockGalpon(g.id); if (d!==null && d<=3) alertas++; });

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-grain"></i></div></div><div class="ki-label">Stock total</div><div class="ki-num num-mono">${num(Math.round(stockTotal))}<span>kg</span></div><div class="ki-context">${(stockTotal/40).toFixed(0)} sacos en bodegas</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-truck"></i></div></div><div class="ki-label">Entradas registradas</div><div class="ki-num num-mono">${entradas.length}<span></span></div><div class="ki-context">${num(totalSacos)} sacos · ${num(Math.round(totalKg/1000))} ton</div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg a"><i class="ti ti-cash"></i></div></div><div class="ki-label">Inversión alimento</div><div class="ki-num num-mono">${mxn(totalGasto)}<span></span></div><div class="ki-context">Acumulado total</div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg ${alertas?'r':'g'}"><i class="ti ti-alert-triangle"></i></div></div><div class="ki-label">Galpones críticos</div><div class="ki-num num-mono">${alertas}<span></span></div><div class="ki-context">${alertas?'Reordenar pronto':'Stock óptimo'}</div></div>`;

  // Stock galpón
  document.getElementById('stock-body').innerHTML = galpones.map(g => {
    const stock = calc.stockAlimentoGalpon(g.id);
    const dias = calc.diasStockGalpon(g.id);
    const isBajo = dias !== null && dias <= 3;
    const max = 30000;
    const pct = Math.min(100, stock/max*100);
    return `<div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;align-items:center;">
        <span style="font-weight:600;">${escapeHTML(g.nombre)} <span style="font-size:11.5px;color:var(--text-3);font-weight:500;">· ${escapeHTML(g.tipo)}</span></span>
        <span class="num-mono" style="font-weight:700;color:${isBajo?'var(--terracotta)':'var(--primary)'};">${num(Math.round(stock))} kg ${dias!==null?` · ${dias}d`:''}${isBajo?' <i class="ti ti-alert-triangle" style="font-size:13px;"></i>':''}</span>
      </div>
      <div class="bar"><div class="bar-fill ${isBajo?'r':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // Consumo vs estándar (primer broiler activo)
  const lote = store.list('lotes', l => l.tipo==='broiler' && l.estado==='activo')[0];
  if (lote) {
    document.getElementById('cons-sub').textContent = `${lote.nombre} · ${lote.linea}`;
    const dias = calc.diasLote(lote);
    const labels = [], real = [], stdArr = [];
    for (let d = 7; d <= dias+7 && d <= lote.duracion; d += 7) {
      labels.push(`Día ${d}`);
      // Consumo real acumulado a ese día
      const inicio = new Date(lote.fechaInicio);
      const fechaD = new Date(inicio); fechaD.setDate(fechaD.getDate()+d);
      const consAcum = store.list('registros', { loteId: lote.id })
        .filter(r => new Date(r.fecha) <= fechaD)
        .reduce((s,r)=>s+(r.alimentoKg||0),0);
      const aves = lote.avesIniciales;
      real.push(d <= dias ? Number((consAcum/aves).toFixed(3)) : null);
      stdArr.push(std.consumoEsperado(lote.linea, d));
    }
    if (window._chC) window._chC.destroy();
    window._chC = new Chart(document.getElementById('chartConsumo').getContext('2d'),{
      type:'line', data:{ labels, datasets:[
        { label:'Real (kg/ave)', data:real, borderColor:'#1F6B47', backgroundColor:'rgba(31,107,71,.10)', borderWidth:3, pointRadius:5, pointBackgroundColor:'#1F6B47', pointBorderColor:'#fff', pointBorderWidth:2.5, tension:.4, fill:true, spanGaps: true },
        { label:`Estándar ${lote.linea}`, data:stdArr, borderColor:'#344473', borderDash:[6,4], borderWidth:2, pointRadius:3, pointBackgroundColor:'#344473', tension:.4 }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top',align:'end',labels:{font:{family:'Inter Tight',size:12,weight:'500'},usePointStyle:true,padding:14,boxWidth:14,boxHeight:8}}, tooltip:{backgroundColor:'#1A1612',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}kg`}}},
        scales:{ x:{grid:{color:'#E8DFD0'},border:{display:false},ticks:{font:{size:10,weight:'600'}}}, y:{grid:{color:'#E8DFD0'},border:{display:false},ticks:{callback:v=>v+'kg'}}}}
    });
  }

  // Tabla entradas
  document.getElementById('ent-count').textContent = `${entradas.length} entradas`;
  const tbody = document.querySelector('#tbl-ent tbody');
  if (!entradas.length) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-3);padding:40px;">Sin entradas</td></tr>';
  else tbody.innerHTML = entradas.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(e => `<tr>
    <td class="num-mono" style="color:var(--text-3)">${fmtFecha(e.fecha,{short:true})}</td>
    <td style="font-weight:600">${escapeHTML(store.get('galpones',e.galponId)?.nombre||'?')}</td>
    <td><span class="pill" style="background:var(--surface-3)">${escapeHTML(e.tipo||'')}</span></td>
    <td class="num-mono">${num(e.sacos||0)}</td>
    <td class="num-mono">${num(e.kgTotal||0)} kg</td>
    <td class="num-mono">${mxn(e.precioPorTon||0)}</td>
    <td class="num-mono" style="font-weight:700;color:var(--terracotta);">−${mxn(e.total||0)}</td>
    <td style="color:var(--text-3)">${escapeHTML(e.proveedor||'—')}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="eliminar('${e.id}')"><i class="ti ti-trash"></i></button></td>
  </tr>`).join('');
}

function abrirEntrada() {
  document.getElementById('e-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('e-galpon').innerHTML = store.list('galpones',{activo:true}).map(g=>`<option value="${g.id}">${g.nombre}</option>`).join('');
  ['e-prov','e-sacos','e-precio'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('e-kg').value = '40';
  document.getElementById('e-total-kg').value = '';
  document.getElementById('e-total').value = '';
  openModal('modal-ent');
}

function calcEnt() {
  const sacos = Number(document.getElementById('e-sacos').value)||0;
  const kg = Number(document.getElementById('e-kg').value)||0;
  const precio = Number(document.getElementById('e-precio').value)||0;
  const totalKg = sacos*kg;
  const total = (totalKg/1000)*precio;
  document.getElementById('e-total-kg').value = num(totalKg) + ' kg';
  document.getElementById('e-total').value = mxn(total);
}

function guardarEntrada() {
  const sacos = Number(document.getElementById('e-sacos').value)||0;
  const kg = Number(document.getElementById('e-kg').value)||0;
  const precio = Number(document.getElementById('e-precio').value)||0;
  const totalKg = sacos*kg;
  const total = (totalKg/1000)*precio;
  if (!sacos) { toast('Sacos requerido','danger'); return; }
  const data = {
    fecha: document.getElementById('e-fecha').value,
    galponId: document.getElementById('e-galpon').value,
    tipo: document.getElementById('e-tipo').value,
    sacos, kgPorSaco: kg, kgTotal: totalKg,
    precioPorTon: precio, total,
    proveedor: document.getElementById('e-prov').value.trim()
  };
  store.create('entradasAlimento', data);
  // Crear gasto asociado
  if (total > 0) {
    store.create('gastos', {
      fecha: data.fecha,
      concepto: `Alimento ${data.tipo} · ${sacos} sacos · ${store.get('galpones',data.galponId)?.nombre}`,
      categoria: 'Alimento', monto: total, proveedor: data.proveedor
    });
  }
  logActivity({ texto:`<strong>Entrada</strong> · ${sacos} sacos ${escapeHTML(data.tipo)} · ${escapeHTML(store.get('galpones',data.galponId)?.nombre||'')}`, tipo:'a', icono:'truck' });
  closeModal('modal-ent'); toast('Entrada registrada','success'); renderPage();
}

function eliminar(id) {
  if (!confirm('¿Eliminar?')) return;
  store.delete('entradasAlimento', id); toast('Eliminada','info'); renderPage();
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
