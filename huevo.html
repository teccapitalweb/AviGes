<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Producción huevo</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Producción huevo</div><div class="page-sub">Postura · clasificación · calidad</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-primary" onclick="abrirRegistro()"><i class="ti ti-plus"></i> Registrar postura</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>
    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Curva de postura</div><div class="card-sub" id="postura-sub">—</div></div></div>
        <div class="card-body"><div class="chart-wrap" style="height:220px;"><canvas id="chartPostura"></canvas></div></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Clasificación por tamaño</div><div class="card-sub">Última semana</div></div></div>
        <div class="card-body" id="clasif-body"></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Registros recientes</div><div class="card-sub" id="huevos-count">—</div></div></div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-huevos"><thead><tr><th>Fecha</th><th>Lote</th><th>Total</th><th>Jumbo</th><th>Extra</th><th>Grande</th><th>Mediano</th><th>Rotos</th><th>%Postura</th><th></th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-huevo">
  <div class="modal" style="max-width:580px;">
    <div class="modal-head"><div><div class="modal-ttl">Registro postura</div></div><button class="modal-close" onclick="closeModal('modal-huevo')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="h-fecha"></div><div class="form-group"><label class="form-label">Lote</label><select class="form-input" id="h-lote" onchange="calcPostura()"></select></div></div>
      <div class="form-group"><label class="form-label">Total huevos del día</label><input type="number" class="form-input" id="h-total" oninput="calcPostura();calcClasif()" style="font-size:18px;font-weight:700;font-family:var(--font-display);"></div>
      <div id="h-postura" style="display:none;background:var(--primary-ll);padding:12px 16px;border-radius:11px;border:1px solid var(--primary-m);margin-bottom:14px;"></div>
      <div style="font-size:11.5px;color:var(--text-3);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;">Clasificación opcional</div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Jumbo +70g</label><input type="number" class="form-input" id="h-jumbo"></div>
        <div class="form-group"><label class="form-label">Extra 60-69g</label><input type="number" class="form-input" id="h-extra"></div>
        <div class="form-group"><label class="form-label">Grande 50-59g</label><input type="number" class="form-input" id="h-grande"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Mediano −50g</label><input type="number" class="form-input" id="h-mediano"></div>
        <div class="form-group"><label class="form-label">Rotos / 2ª</label><input type="number" class="form-input" id="h-rotos"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-huevo')">Cancelar</button><button class="btn btn-primary" onclick="guardarHuevo()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const lotesPon = store.list('lotes', l => l.tipo === 'ponedora' && l.estado === 'activo');
  const ahora = new Date();
  const hoy = ahora.toISOString().slice(0,10);
  const huevosHoy = store.list('huevos').filter(h => h.fecha?.slice(0,10) === hoy);
  const totalHoy = huevosHoy.reduce((s,h)=>s+h.total,0);
  const totalAves = lotesPon.reduce((s,l)=>s+calc.avesVivas(l),0);
  const pctHoy = totalAves ? (totalHoy/totalAves*100).toFixed(1) : 0;

  // Calcular promedio semana
  const semIni = new Date(); semIni.setDate(semIni.getDate()-7);
  const semHuevos = store.list('huevos').filter(h => new Date(h.fecha) >= semIni);
  const totalSem = semHuevos.reduce((s,h)=>s+h.total,0);
  const cartonesSem = Math.round(totalSem/12);

  // Inventario
  const inventario = totalSem - store.list('ventas').filter(v=>v.tipo?.includes('Huevo')&&new Date(v.fecha)>=semIni).reduce((s,v)=>s+(v.cantidad*12),0);

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-egg"></i></div><span class="ki-trend up"><i class="ti ti-trending-up"></i></span></div><div class="ki-label">Huevos hoy</div><div class="ki-num num-mono">${num(totalHoy)}<span>pzas</span></div><div class="ki-context">${Math.round(totalHoy/12)} cartones</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-percentage"></i></div><span class="ki-trend up"><i class="ti ti-trending-up"></i></span></div><div class="ki-label">% Postura hoy</div><div class="ki-num num-mono">${pctHoy}<span>%</span></div><div class="ki-context">${num(totalAves)} aves activas</div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg a"><i class="ti ti-package"></i></div><span class="ki-trend up"><i class="ti ti-stack"></i></span></div><div class="ki-label">Producción semana</div><div class="ki-num num-mono">${num(cartonesSem)}<span>ctn</span></div><div class="ki-context">${num(totalSem)} huevos</div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg p"><i class="ti ti-trophy"></i></div><span class="ki-trend up"><i class="ti ti-check"></i></span></div><div class="ki-label">Lotes ponedoras</div><div class="ki-num num-mono">${lotesPon.length}<span>activos</span></div><div class="ki-context">${num(totalAves)} aves totales</div></div>`;

  // Curva
  const lote = lotesPon[0];
  if (lote) {
    document.getElementById('postura-sub').textContent = `${lote.nombre} · ${lote.linea}`;
    const semIni = Math.max(18, calc.semanasLote(lote)-12);
    const semFin = calc.semanasLote(lote);
    const labels = [], real = [], stdArr = [];
    for (let s = semIni; s <= semFin+4; s++) {
      labels.push(`Sem ${s}`);
      stdArr.push(std.posturaEsperado(lote.linea, s));
      if (s <= semFin) {
        // Calcular postura real de esa semana
        const inicio = new Date(lote.fechaInicio);
        const semIniDate = new Date(inicio); semIniDate.setDate(semIniDate.getDate() + (s-1)*7);
        const semFinDate = new Date(inicio); semFinDate.setDate(semFinDate.getDate() + s*7);
        const huevosSem = store.list('huevos').filter(h => h.loteId===lote.id && new Date(h.fecha)>=semIniDate && new Date(h.fecha)<semFinDate);
        const totSem = huevosSem.reduce((s,h)=>s+h.total,0);
        const aves = calc.avesVivas(lote);
        const pctSem = aves ? (totSem/(aves*7)*100) : 0;
        real.push(pctSem > 0 ? Number(pctSem.toFixed(1)) : null);
      } else real.push(null);
    }
    if (window._chP) window._chP.destroy();
    window._chP = new Chart(document.getElementById('chartPostura').getContext('2d'),{
      type:'line', data:{ labels, datasets:[
        { label:'Real', data:real, borderColor:'#1F6B47', backgroundColor:'rgba(31,107,71,.10)', borderWidth:3, pointRadius:5, pointBackgroundColor:'#1F6B47', pointBorderColor:'#fff', pointBorderWidth:2.5, tension:.4, fill:true, spanGaps: true },
        { label:`Estándar ${lote.linea}`, data:stdArr, borderColor:'#344473', borderDash:[6,4], borderWidth:2, pointRadius:3, pointBackgroundColor:'#344473', tension:.4 }]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'top',align:'end',labels:{font:{family:'Inter Tight',size:12,weight:'500'},usePointStyle:true,padding:14,boxWidth:14,boxHeight:8}}, tooltip:{backgroundColor:'#1A1612',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y}%`}}},
        scales:{ x:{grid:{color:'#E8DFD0'},border:{display:false},ticks:{font:{size:10,weight:'600'}}}, y:{min:0,max:100,grid:{color:'#E8DFD0'},border:{display:false},ticks:{callback:v=>v+'%'}}}}
    });
  }

  // Clasificación semana
  const semHuv = store.list('huevos').filter(h => new Date(h.fecha) >= semIni);
  const tot = { jumbo:0, extra:0, grande:0, mediano:0, rotos:0 };
  semHuv.forEach(h => { tot.jumbo += h.jumbo||0; tot.extra += h.extra||0; tot.grande += h.grande||0; tot.mediano += h.mediano||0; tot.rotos += h.rotos||0; });
  const totBuenos = tot.jumbo + tot.extra + tot.grande + tot.mediano;
  const sumAll = totBuenos + tot.rotos;
  const labels2 = [['Jumbo +70g','jumbo','var(--amber-d)'],['Extra 60-69g','extra','var(--primary)'],['Grande 50-59g','grande','var(--info)'],['Mediano −50g','mediano','#7A6F62'],['Rotos / 2ª','rotos','var(--terracotta)']];
  document.getElementById('clasif-body').innerHTML = sumAll ? labels2.map(([lbl,k,c])=>{
    const v = tot[k];
    const pct = sumAll?(v/sumAll*100).toFixed(0):0;
    return `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;"><span style="font-weight:600;">${lbl}</span><span class="num-mono" style="font-weight:700;color:${c};">${num(v)} <span style="color:var(--text-3);font-weight:500;">(${pct}%)</span></span></div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${c};"></div></div></div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin clasificación esta semana</div></div>';

  // Tabla
  const huevos = store.list('huevos').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).slice(0,30);
  document.getElementById('huevos-count').textContent = `${store.list('huevos').length} registros · mostrando 30 más recientes`;
  const tbody = document.querySelector('#tbl-huevos tbody');
  if (!huevos.length) tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-3);padding:40px;">Sin registros de postura</td></tr>';
  else tbody.innerHTML = huevos.map(h => {
    const lote = store.get('lotes', h.loteId);
    const aves = lote ? calc.avesVivas(lote) : 0;
    const pct = aves ? ((h.total/aves)*100).toFixed(1) : 0;
    return `<tr>
      <td class="num-mono" style="color:var(--text-3)">${fmtFecha(h.fecha,{short:true})}</td>
      <td style="font-weight:600">${escapeHTML(lote?.nombre||'?')}</td>
      <td class="num-mono" style="font-weight:700">${num(h.total)}</td>
      <td class="num-mono" style="color:var(--amber-d)">${num(h.jumbo||0)}</td>
      <td class="num-mono" style="color:var(--primary)">${num(h.extra||0)}</td>
      <td class="num-mono" style="color:var(--info)">${num(h.grande||0)}</td>
      <td class="num-mono">${num(h.mediano||0)}</td>
      <td class="num-mono" style="color:var(--terracotta)">${num(h.rotos||0)}</td>
      <td><span class="iep ${pct>90?'ex':pct>80?'bk':'rg'}">${pct}%</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="eliminar('${h.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');
}

function abrirRegistro() {
  document.getElementById('h-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('h-lote').innerHTML = store.list('lotes', l => l.tipo==='ponedora'&&l.estado==='activo').map(l=>`<option value="${l.id}">${l.nombre} · ${l.linea}</option>`).join('') || '<option value="">No hay lotes ponedora activos</option>';
  ['h-total','h-jumbo','h-extra','h-grande','h-mediano','h-rotos'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('h-postura').style.display = 'none';
  openModal('modal-huevo');
}

function calcPostura() {
  const id = document.getElementById('h-lote').value;
  const total = Number(document.getElementById('h-total').value)||0;
  if (!id || !total) { document.getElementById('h-postura').style.display='none'; return; }
  const lote = store.get('lotes', id);
  const aves = calc.avesVivas(lote);
  if (!aves) return;
  const pct = (total/aves*100).toFixed(1);
  const stdPct = std.posturaEsperado(lote.linea, calc.semanasLote(lote));
  const dif = pct - stdPct;
  const el = document.getElementById('h-postura');
  el.style.display = 'block';
  el.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;"><span style="font-weight:600;color:var(--primary);">${num(aves)} aves · % postura</span><span class="num-mono" style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--primary);">${pct}% <span style="font-size:12px;color:${dif>=0?'var(--primary)':'var(--amber-d)'};">vs ${stdPct}% std (${dif>=0?'+':''}${dif.toFixed(1)})</span></span></div>`;
}

function calcClasif() {
  const total = Number(document.getElementById('h-total').value)||0;
  if (!total) return;
}

function guardarHuevo() {
  const id = document.getElementById('h-lote').value;
  const total = Number(document.getElementById('h-total').value)||0;
  if (!id || !total) { toast('Lote y total requeridos','danger'); return; }
  const data = {
    fecha: document.getElementById('h-fecha').value,
    loteId: id, total,
    jumbo: Number(document.getElementById('h-jumbo').value)||0,
    extra: Number(document.getElementById('h-extra').value)||0,
    grande: Number(document.getElementById('h-grande').value)||0,
    mediano: Number(document.getElementById('h-mediano').value)||0,
    rotos: Number(document.getElementById('h-rotos').value)||0
  };
  store.create('huevos', data);
  const lote = store.get('lotes', id);
  logActivity({ texto:`<strong>${auth.current()?.nombre||'Tú'}</strong> registró <strong>${num(total)} huevos</strong> en ${store.get('galpones',lote.galponId)?.nombre}`, tipo:'b', icono:'edit' });
  closeModal('modal-huevo'); toast('Postura registrada','success'); renderPage();
}

function eliminar(id) {
  if (!confirm('¿Eliminar registro?')) return;
  store.delete('huevos', id); toast('Eliminado','info'); renderPage();
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
