<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Producción</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Producción</div><div class="page-sub">Vista panorámica de la granja</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-secondary btn-sm" onclick="window.location='reportes.html'"><i class="ti ti-file-text"></i> Reporte</button>
      <button class="btn btn-primary" onclick="window.location='lotes.html'"><i class="ti ti-paw"></i> Ver lotes</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>

    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Distribución por línea genética</div><div class="card-sub" id="dist-sub">—</div></div></div>
        <div class="card-body" id="dist-body"></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Producción total</div><div class="card-sub">Acumulado por tipo</div></div></div>
        <div class="card-body"><div class="chart-wrap" style="height:240px;"><canvas id="chartProd"></canvas></div></div>
      </div>
    </div>

    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Producción acumulada por lote</div><div class="card-sub" id="acum-sub">—</div></div></div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-acum"><thead><tr><th>Lote</th><th>Tipo</th><th>Día</th><th>Aves vivas</th><th>Producción</th><th>CA / Postura</th><th>Costo</th><th>Ingreso</th><th>Margen</th></tr></thead><tbody></tbody></table></div>
    </div>

    <div class="g2 mb16">
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Próximas salidas</div><div class="card-sub">Broilers cerca del ciclo</div></div></div>
        <div class="card-body" id="salidas-body"></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Top productos vendidos</div><div class="card-sub">Mes en curso</div></div></div>
        <div class="card-body" id="top-prod"></div>
      </div>
    </div>
  </div>
</main>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const lotes = store.list('lotes', { estado: 'activo' });
  const broilers = lotes.filter(l => l.tipo === 'broiler');
  const ponedoras = lotes.filter(l => l.tipo === 'ponedora');
  const totalAvesBroiler = broilers.reduce((s,l)=>s+calc.avesVivas(l), 0);
  const totalAvesPon = ponedoras.reduce((s,l)=>s+calc.avesVivas(l), 0);
  // Kg producidos hoy = aves vivas * peso ult / 1000
  const kgHoy = broilers.reduce((s,l)=>{const p=calc.ultimoPeso(l.id);return s + (p>0 ? calc.avesVivas(l)*p/1000 : 0);}, 0);
  const huevosHoy = ponedoras.reduce((s,l)=>s+calc.huevosHoy(l.id),0);
  const ventasMes = store.list('ventas').filter(v=>{const f=new Date(v.fecha);const a=new Date();return f.getMonth()===a.getMonth()&&f.getFullYear()===a.getFullYear();});
  const ingresoMes = ventasMes.reduce((s,v)=>s+v.total,0);
  const eficiencia = lotes.length ? Math.round(lotes.reduce((s,l)=>s+(l.tipo==='broiler'?calc.iep(l):calc.pctPosturaHoy(l)*4),0)/lotes.length) : 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-paw"></i></div></div><div class="ki-label">Pollo en pie</div><div class="ki-num num-mono">${num(Math.round(kgHoy))}<span>kg</span></div><div class="ki-context">${num(totalAvesBroiler)} aves · ${broilers.length} lotes</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg a"><i class="ti ti-egg"></i></div></div><div class="ki-label">Huevos hoy</div><div class="ki-num num-mono">${num(huevosHoy)}<span>pzas</span></div><div class="ki-context">${num(totalAvesPon)} ponedoras</div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-cash"></i></div></div><div class="ki-label">Ingreso mes</div><div class="ki-num num-mono">${mxn(ingresoMes)}<span></span></div><div class="ki-context">${ventasMes.length} ventas</div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg p"><i class="ti ti-trophy"></i></div></div><div class="ki-label">Eficiencia global</div><div class="ki-num num-mono">${eficiencia}<span>pts</span></div><div class="ki-context">${lotes.length} lotes activos</div></div>`;

  // Distribución por línea
  const lineas = {};
  lotes.forEach(l => {
    if (!lineas[l.linea]) lineas[l.linea] = { aves:0, count:0, tipo:l.tipo };
    lineas[l.linea].aves += calc.avesVivas(l);
    lineas[l.linea].count++;
  });
  const totalAves = Object.values(lineas).reduce((s,x)=>s+x.aves,0);
  document.getElementById('dist-sub').textContent = `${Object.keys(lineas).length} líneas activas`;
  const colors = ['var(--primary)','#C8821F','#344473','#6B3F5F','#B85738'];
  document.getElementById('dist-body').innerHTML = Object.entries(lineas).map(([l,d],i)=>{
    const pct = totalAves?(d.aves/totalAves*100).toFixed(0):0;
    return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;align-items:center;"><span style="font-weight:600;display:flex;align-items:center;gap:6px;"><i class="ti ti-${d.tipo==='broiler'?'burger':'egg'}" style="color:${colors[i%5]};font-size:14px;"></i> ${escapeHTML(l)} <span style="font-size:11px;color:var(--text-3);font-weight:500;">· ${d.count} lote${d.count===1?'':'s'}</span></span><span class="num-mono" style="font-weight:700;">${num(d.aves)} <span style="color:var(--text-3);font-weight:500;">(${pct}%)</span></span></div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${colors[i%5]};"></div></div></div>`;
  }).join('') || '<div class="empty"><div class="empty-sub">Sin lotes activos</div></div>';

  // Producción total chart - últimos 7 días
  const labels = [], dPollo = [], dHuevo = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const fStr = d.toISOString().slice(0,10);
    labels.push(d.getDate());
    const huv = store.list('huevos').filter(h=>h.fecha?.slice(0,10)===fStr).reduce((s,h)=>s+h.total,0);
    dHuevo.push(huv);
    // Aproximación: pollo entregado en ventas
    const ventasPollo = store.list('ventas').filter(v=>v.fecha?.slice(0,10)===fStr && v.tipo?.includes('Pollo')).reduce((s,v)=>s+v.cantidad,0);
    dPollo.push(ventasPollo);
  }
  if (window._chPP) window._chPP.destroy();
  window._chPP = new Chart(document.getElementById('chartProd').getContext('2d'),{
    type:'bar', data:{ labels, datasets:[
      { label:'Pollo (kg vendidos)', data:dPollo, backgroundColor:'rgba(31,107,71,.85)', borderRadius:5, barPercentage:.6 },
      { label:'Huevos (pzas)', data:dHuevo, backgroundColor:'rgba(200,130,31,.85)', borderRadius:5, barPercentage:.6, yAxisID:'y2' }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top',align:'end',labels:{font:{family:'Inter Tight',size:12,weight:'500'},usePointStyle:true,padding:14,boxWidth:12,boxHeight:8}}, tooltip:{backgroundColor:'#1A1612',padding:12,cornerRadius:10}},
      scales:{ x:{grid:{display:false},border:{display:false}}, y:{grid:{color:'#E8DFD0'},border:{display:false},ticks:{callback:v=>num(v)+'kg'}}, y2:{position:'right',grid:{display:false},border:{display:false},ticks:{callback:v=>num(v)}}}}
  });

  // Tabla acumulada
  document.getElementById('acum-sub').textContent = `${lotes.length} lotes activos`;
  const tbody = document.querySelector('#tbl-acum tbody');
  if (!lotes.length) tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-3);padding:40px;">Sin lotes activos</td></tr>';
  else tbody.innerHTML = lotes.map(l=>{
    const r = calc.resumenLote(l);
    const esBroiler = l.tipo==='broiler';
    const peso = r.ultimoPeso/1000;
    const prod = esBroiler ? num(Math.round(r.avesVivas*peso))+' kg' : num(r.huevosTotales)+' huevos';
    const eficiencia = esBroiler ? `CA ${r.ca||'—'}` : `${r.pctPostura||0}% postura`;
    return `<tr>
      <td><span class="badge badge-${esBroiler?'green':'blue'}"><i class="ti ti-paw"></i> ${escapeHTML(l.nombre.replace('Lote ',''))}</span></td>
      <td><span class="pill ${esBroiler?'pill-br':'pill-po'}"><i class="ti ti-${esBroiler?'burger':'egg'}"></i> ${esBroiler?'Broiler':'Ponedora'}</span></td>
      <td style="color:var(--text-3);font-weight:600">${r.dias}/${l.duracion}</td>
      <td class="num-mono" style="font-weight:700">${num(r.avesVivas)}</td>
      <td class="num-mono" style="font-weight:600">${prod}</td>
      <td>${eficiencia}</td>
      <td class="num-mono" style="color:var(--terracotta)">−${mxn(r.costoTotal)}</td>
      <td class="num-mono" style="color:var(--primary)">+${mxn(r.ingresoTotal)}</td>
      <td class="num-mono" style="font-weight:700;color:${r.margen>=0?'var(--primary)':'var(--terracotta)'};">${r.margen>=0?'+':''}${mxn(r.margen)}</td>
    </tr>`;
  }).join('');

  // Próximas salidas
  const salidas = broilers.map(l=>{
    const restante = l.duracion - calc.diasLote(l);
    const fecha = new Date(l.fechaInicio); fecha.setDate(fecha.getDate()+l.duracion);
    return { lote:l, restante, fecha };
  }).filter(s=>s.restante>0).sort((a,b)=>a.restante-b.restante).slice(0,4);
  document.getElementById('salidas-body').innerHTML = salidas.length ? salidas.map(s=>{
    const galpon = store.get('galpones',s.lote.galponId)?.nombre||'';
    const aves = calc.avesVivas(s.lote);
    const peso = calc.ultimoPeso(s.lote.id)/1000 || 2.7;
    const kg = Math.round(aves*peso);
    return `<div style="padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-weight:700;font-size:14px;">${escapeHTML(s.lote.nombre)} · ${escapeHTML(galpon)}</div><div style="font-size:11.5px;color:var(--text-3);font-weight:500;margin-top:2px;">${num(aves)} aves · ~${num(kg)} kg estimados</div></div>
      <div style="text-align:right;"><div style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--primary);">${s.restante} días</div><div style="font-size:11px;color:var(--text-3);font-weight:500;">${fmtFecha(s.fecha,{short:true})}</div></div>
    </div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin broilers próximos a salir</div></div>';

  // Top productos
  const prods = {};
  ventasMes.forEach(v => { prods[v.tipo] = (prods[v.tipo]||0)+v.total; });
  const top = Object.entries(prods).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('top-prod').innerHTML = top.length ? top.map(([t,total],i)=>{
    const cant = ventasMes.filter(v=>v.tipo===t).reduce((s,v)=>s+v.cantidad,0);
    const unidad = t.includes('Pollo')?'kg':'cartones';
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);"><div style="width:30px;height:30px;border-radius:50%;background:${colors[i]};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;">${i+1}</div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">${escapeHTML(t)}</div><div style="font-size:11px;color:var(--text-3);font-weight:500;">${num(cant)} ${unidad} vendidos</div></div><div class="num-mono" style="font-weight:700;color:var(--primary);">${mxn(total)}</div></div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin ventas este mes</div></div>';
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
