<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Mis Lotes</title>
<link rel="stylesheet" href="shared.css">
<style>
.lote-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 22px 24px; cursor: pointer; transition: all .2s; box-shadow: var(--shadow-xs); animation: fadeUp .45s cubic-bezier(.2,.8,.4,1) forwards; opacity: 0; position: relative; overflow: hidden; }
.lote-card:hover { border-color: var(--primary-m); box-shadow: var(--shadow); transform: translateY(-2px); }
.lc-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.lc-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -.4px; }
.lc-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; font-weight: 500; }
.lc-progress-bar { width: 100%; height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; margin: 12px 0 6px; }
.lc-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-d)); border-radius: 3px; transition: width .5s; }
.lc-progress-fill.warn { background: linear-gradient(90deg, var(--amber), var(--amber-d)); }
.lc-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 14px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 14px 0; }
.lc-stat-lbl { font-size: 10px; color: var(--text-3); font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.lc-stat-val { font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: -.4px; line-height: 1; font-feature-settings: 'tnum'; }
.lc-stat-val.g { color: var(--primary); }
.lc-stat-val.a { color: var(--amber-d); }
.lc-stat-val.r { color: var(--terracotta); }
.lc-stat-val span { font-size: 11px; color: var(--text-3); font-weight: 500; margin-left: 2px; }
.lc-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.tabs-h { display: flex; gap: 4px; padding: 4px; background: var(--surface-2); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; width: fit-content; }
.tab-h { padding: 7px 14px; border-radius: 7px; font-size: 12.5px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all .15s; letter-spacing: -.1px; }
.tab-h.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-xs); }
.tab-h:hover:not(.active) { color: var(--text); }
</style>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Mis Lotes</div><div class="page-sub" id="lotes-count">—</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-secondary btn-sm"><i class="ti ti-filter"></i> Filtrar</button>
      <button class="btn btn-primary" onclick="openModal('modal-lote')"><i class="ti ti-plus"></i> Nuevo lote</button>
    </div>
  </div>
  <div class="content">

    <div class="tabs-h" id="tabs"></div>
    <div class="g3" id="lotes-grid"></div>

  </div>
</main>

<!-- MODAL: Nuevo Lote -->
<div class="modal-overlay" id="modal-lote">
  <div class="modal" style="max-width:640px;">
    <div class="modal-head"><div><div class="modal-ttl">Nuevo lote</div><div class="card-sub">Registra un lote nuevo en producción</div></div><button class="modal-close" onclick="closeModal('modal-lote')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nombre del lote</label><input type="text" class="form-input" id="f-nombre" placeholder="Ej: Lote 24-E"></div>
        <div class="form-group"><label class="form-label">Galpón</label><select class="form-input" id="f-galpon"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tipo</label>
          <select class="form-input" id="f-tipo" onchange="actualizarLineas()"><option value="broiler">Broiler (engorda)</option><option value="ponedora">Ponedora (postura)</option></select></div>
        <div class="form-group"><label class="form-label">Línea genética</label><select class="form-input" id="f-linea"></select></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Fecha de entrada</label><input type="date" class="form-input" id="f-fecha"></div>
        <div class="form-group"><label class="form-label">Cantidad de aves</label><input type="number" class="form-input" id="f-aves" placeholder="18000"></div>
        <div class="form-group"><label class="form-label">Costo $/pollito</label><input type="number" class="form-input" id="f-costo" placeholder="14.5" step="0.1"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Proveedor</label><input type="text" class="form-input" id="f-prov" placeholder="Tyson"></div>
        <div class="form-group"><label class="form-label">Duración esperada (días)</label><input type="number" class="form-input" id="f-dur" value="42"></div>
      </div>
      <div class="form-group"><label class="form-label">Notas</label><textarea class="form-input" id="f-notas" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-lote')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarLote()"><i class="ti ti-check"></i> Guardar lote</button>
    </div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
let filtroActivo = 'todos';

function renderTabs() {
  const lotes = store.list('lotes');
  const counts = {
    todos: lotes.length,
    activos: lotes.filter(l => l.estado === 'activo').length,
    cerrados: lotes.filter(l => l.estado === 'cerrado').length,
    broilers: lotes.filter(l => l.tipo === 'broiler' && l.estado === 'activo').length,
    ponedoras: lotes.filter(l => l.tipo === 'ponedora' && l.estado === 'activo').length
  };
  const tabs = [
    { k:'todos', l:'Todos', n:counts.todos },
    { k:'activos', l:'Activos', n:counts.activos },
    { k:'broilers', l:'Broilers', n:counts.broilers },
    { k:'ponedoras', l:'Ponedoras', n:counts.ponedoras },
    { k:'cerrados', l:'Cerrados', n:counts.cerrados }
  ];
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<div class="tab-h ${t.k===filtroActivo?'active':''}" onclick="setFiltro('${t.k}')">${t.l} <span style="opacity:.6;font-weight:500;">${t.n}</span></div>`
  ).join('');
}

function setFiltro(f) { filtroActivo = f; renderTabs(); renderGrid(); }

function renderGrid() {
  let lotes = store.list('lotes');
  if (filtroActivo === 'activos') lotes = lotes.filter(l => l.estado === 'activo');
  else if (filtroActivo === 'cerrados') lotes = lotes.filter(l => l.estado === 'cerrado');
  else if (filtroActivo === 'broilers') lotes = lotes.filter(l => l.tipo === 'broiler' && l.estado === 'activo');
  else if (filtroActivo === 'ponedoras') lotes = lotes.filter(l => l.tipo === 'ponedora' && l.estado === 'activo');

  document.getElementById('lotes-count').textContent =
    `${lotes.length} lotes ${filtroActivo!=='todos'?filtroActivo:'en total'}`;

  const grid = document.getElementById('lotes-grid');
  if (!lotes.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1;padding:60px 20px;"><div class="empty-icon"><i class="ti ti-paw"></i></div><div class="empty-ttl">No hay lotes</div><div class="empty-sub">Crea tu primer lote para empezar</div><button class="btn btn-primary" style="margin-top:16px;" onclick="openModal('modal-lote')"><i class="ti ti-plus"></i> Crear lote</button></div>`;
    return;
  }

  grid.innerHTML = lotes.map((l, i) => {
    const r = calc.resumenLote(l);
    const galpon = store.get('galpones', l.galponId)?.nombre || '—';
    const avance = (r.dias / l.duracion) * 100;
    const esBroiler = l.tipo === 'broiler';
    const isMortAlta = r.pctMortalidad > 3;
    const tipoIcon = esBroiler ? 'burger' : 'egg';
    const tipoColor = esBroiler ? 'pill-br' : 'pill-po';
    const cerrado = l.estado === 'cerrado';

    let stat3, stat3Lbl;
    if (esBroiler) { stat3 = r.iep || '—'; stat3Lbl = 'IEP'; }
    else { stat3 = r.pctPostura ? r.pctPostura.toFixed(1)+'%' : '—'; stat3Lbl = '% Postura'; }

    return `
      <div class="lote-card delay-${(i%6)+1}" style="animation-delay:${i*.05}s;" onclick="verLote('${l.id}')">
        <div class="lc-head">
          <div>
            <div class="lc-title">${escapeHTML(l.nombre)}</div>
            <div class="lc-sub">${escapeHTML(galpon)} · ${escapeHTML(l.linea)}</div>
          </div>
          <span class="pill ${tipoColor}"><i class="ti ti-${tipoIcon}"></i> ${esBroiler?'Broiler':'Ponedora'}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);font-weight:500;margin-bottom:4px;">
          <span>Día ${r.dias} de ${l.duracion}</span>
          <span class="num-mono" style="font-weight:700;color:${cerrado?'var(--text-3)':'var(--primary)'};">${cerrado?'Cerrado':Math.round(avance)+'%'}</span>
        </div>
        <div class="lc-progress-bar"><div class="lc-progress-fill ${isMortAlta?'warn':''}" style="width:${Math.min(100,avance)}%"></div></div>
        <div class="lc-stats">
          <div><div class="lc-stat-lbl">Aves vivas</div><div class="lc-stat-val">${num(r.avesVivas)}</div></div>
          <div><div class="lc-stat-lbl">Mortalidad</div><div class="lc-stat-val ${isMortAlta?'r':'g'}">${r.pctMortalidad.toFixed(1)}<span>%</span></div></div>
          <div><div class="lc-stat-lbl">${stat3Lbl}</div><div class="lc-stat-val ${esBroiler?'g':'a'}">${stat3}</div></div>
        </div>
        <div class="lc-foot">
          <span class="num-mono" style="font-size:11px;color:var(--text-3);font-weight:500;">Inicio: ${fmtFecha(l.fechaInicio,{short:true})}</span>
          ${cerrado ? '<span class="pill pill-warn"><i class="ti ti-circle-check"></i> Cerrado</span>' : '<span class="pill pill-ok"><span class="sdot g"></span> Activo</span>'}
        </div>
      </div>`;
  }).join('');
}

function actualizarLineas() {
  const tipo = document.getElementById('f-tipo').value;
  const lineas = std.lineas(tipo);
  document.getElementById('f-linea').innerHTML = lineas.map(l => `<option>${l}</option>`).join('');
  // Filtrar galpones del tipo seleccionado
  const gs = store.list('galpones', { tipo, activo: true });
  document.getElementById('f-galpon').innerHTML = gs.map(g => `<option value="${g.id}">${g.nombre} (${num(g.capacidad)} aves)</option>`).join('');
  // Duración default
  document.getElementById('f-dur').value = tipo === 'broiler' ? 42 : 360;
}

function abrirModalNuevo() {
  document.getElementById('f-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-nombre').value = `Lote ${new Date().getFullYear().toString().slice(-2)}-${String.fromCharCode(65 + store.list('lotes').length)}`;
  actualizarLineas();
  openModal('modal-lote');
}

function guardarLote() {
  const data = {
    nombre: document.getElementById('f-nombre').value.trim(),
    galponId: document.getElementById('f-galpon').value,
    tipo: document.getElementById('f-tipo').value,
    linea: document.getElementById('f-linea').value,
    fechaInicio: document.getElementById('f-fecha').value,
    avesIniciales: Number(document.getElementById('f-aves').value),
    costoPollito: Number(document.getElementById('f-costo').value),
    proveedor: document.getElementById('f-prov').value.trim(),
    duracion: Number(document.getElementById('f-dur').value),
    notas: document.getElementById('f-notas').value.trim(),
    estado: 'activo'
  };

  if (!data.nombre || !data.avesIniciales || !data.fechaInicio) {
    toast('Completa nombre, aves y fecha de entrada','danger'); return;
  }

  store.create('lotes', data);
  // Registrar gasto inicial
  if (data.costoPollito > 0) {
    store.create('gastos', {
      fecha: data.fechaInicio,
      loteId: store.list('lotes', { nombre: data.nombre })[0]?.id,
      concepto: `Compra ${num(data.avesIniciales)} pollitos`,
      categoria: 'Pollito',
      monto: data.avesIniciales * data.costoPollito,
      proveedor: data.proveedor
    });
  }

  logActivity({ texto: `<strong>${auth.current()?.nombre||'Tú'}</strong> creó <strong>${data.nombre}</strong> · ${num(data.avesIniciales)} aves`, tipo: 'g', icono: 'plus' });

  closeModal('modal-lote');
  toast('Lote creado','success');
  renderTabs();
  renderGrid();
}

function verLote(id) {
  // Por ahora muestra info en consola; idealmente abrir página de detalle
  const l = store.get('lotes', id);
  const r = calc.resumenLote(l);
  alert(
    `${l.nombre}\n` +
    `Galpón: ${store.get('galpones',l.galponId)?.nombre}\n` +
    `Línea: ${l.linea}\n` +
    `Día ${r.dias} de ${l.duracion}\n\n` +
    `Aves vivas: ${num(r.avesVivas)}\n` +
    `Mortalidad: ${r.pctMortalidad.toFixed(2)}%\n` +
    `Peso: ${num(r.ultimoPeso)} g\n` +
    `CA: ${r.ca}\n` +
    `IEP: ${r.iep}\n\n` +
    `Costo total: ${mxn(r.costoTotal)}\n` +
    `Ingreso: ${mxn(r.ingresoTotal)}\n` +
    `Margen: ${mxn(r.margen)}`
  );
}

// Override del onclick del botón nuevo
document.querySelector('.btn-primary').onclick = abrirModalNuevo;

setTimeout(() => { renderTabs(); renderGrid(); }, 50);
</script>
</body>
</html>
