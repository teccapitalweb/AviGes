<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Costos</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Costos y gastos</div><div class="page-sub">Control financiero del periodo</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-primary" onclick="abrirNuevoGasto()"><i class="ti ti-plus"></i> Nuevo gasto</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>
    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Distribución de gastos</div><div class="card-sub" id="gastos-sub">—</div></div></div>
        <div class="card-body" id="dist-body"></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Costos vs Ventas</div><div class="card-sub">Comparativo por mes</div></div></div>
        <div class="card-body"><div class="chart-wrap" style="height:240px;"><canvas id="chartCV"></canvas></div></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Historial de gastos</div><div class="card-sub" id="gastos-count">—</div></div></div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-gastos"><thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th>Lote</th><th>Proveedor</th><th>Monto</th><th></th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-gasto">
  <div class="modal" style="max-width:560px;">
    <div class="modal-head"><div><div class="modal-ttl">Nuevo gasto</div></div><button class="modal-close" onclick="closeModal('modal-gasto')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="g-fecha"></div><div class="form-group"><label class="form-label">Categoría</label><select class="form-input" id="g-cat"><option>Alimento</option><option>Pollito</option><option>Vacuna</option><option>Medicamento</option><option>Mano obra</option><option>Energía</option><option>Mantenimiento</option><option>Otros</option></select></div></div>
      <div class="form-group"><label class="form-label">Concepto</label><input type="text" class="form-input" id="g-concepto" placeholder="Descripción del gasto"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Lote (opcional)</label><select class="form-input" id="g-lote"></select></div><div class="form-group"><label class="form-label">Monto MXN</label><input type="number" class="form-input" id="g-monto" step="0.01"></div></div>
      <div class="form-group"><label class="form-label">Proveedor</label><input type="text" class="form-input" id="g-prov"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-gasto')">Cancelar</button><button class="btn btn-primary" onclick="guardarGasto()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const gastos = store.list('gastos');
  const ventas = store.list('ventas');
  const ahora = new Date();
  const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
  const gastosMes = gastos.filter(g => new Date(g.fecha) >= inicioMes);
  const totalGastos = gastosMes.reduce((s,g)=>s+g.monto,0);
  const totalVentas = ventas.filter(v=>new Date(v.fecha)>=inicioMes).reduce((s,v)=>s+v.total,0);
  const utilidad = totalVentas - totalGastos;
  const margen = totalVentas ? (utilidad/totalVentas*100).toFixed(1) : 0;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg r"><i class="ti ti-arrow-down-right"></i></div></div><div class="ki-label">Gastos del mes</div><div class="ki-num num-mono r">−${mxn(totalGastos)}<span></span></div><div class="ki-context">${gastosMes.length} gasto${gastosMes.length===1?'':'s'} registrado${gastosMes.length===1?'':'s'}</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-arrow-up-right"></i></div></div><div class="ki-label">Ingresos del mes</div><div class="ki-num num-mono g">+${mxn(totalVentas)}<span></span></div><div class="ki-context">Ventas del periodo</div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg ${utilidad>=0?'g':'r'}"><i class="ti ti-cash"></i></div></div><div class="ki-label">Utilidad neta</div><div class="ki-num num-mono ${utilidad>=0?'g':'r'}">${utilidad>=0?'+':''}${mxn(utilidad)}<span></span></div><div class="ki-context">Margen: <strong>${margen}%</strong></div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-percentage"></i></div></div><div class="ki-label">% Alimento</div><div class="ki-num num-mono">${totalGastos?(gastosMes.filter(g=>g.categoria==='Alimento').reduce((s,g)=>s+g.monto,0)/totalGastos*100).toFixed(0):0}<span>%</span></div><div class="ki-context">Del costo total</div></div>`;

  // Distribución
  const categorias = {};
  gastosMes.forEach(g => categorias[g.categoria] = (categorias[g.categoria]||0)+g.monto);
  const colors = { 'Alimento':'var(--primary)', 'Pollito':'var(--info)', 'Vacuna':'var(--terracotta)', 'Medicamento':'#B85738', 'Mano obra':'var(--amber)', 'Energía':'var(--plum)', 'Mantenimiento':'#5B4D40', 'Otros':'#7A6F62' };
  const ordered = Object.entries(categorias).sort((a,b)=>b[1]-a[1]);
  document.getElementById('gastos-sub').textContent = `${ordered.length} categorías · ${mxn(totalGastos)} total`;
  document.getElementById('dist-body').innerHTML = ordered.length ? ordered.map(([cat,val])=>{
    const pct = totalGastos?(val/totalGastos*100).toFixed(0):0;
    return `<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;"><span style="font-weight:600;">${escapeHTML(cat)}</span><span class="num-mono" style="font-weight:700;">${mxn(val)} <span style="color:var(--text-3);font-weight:500;">(${pct}%)</span></span></div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${colors[cat]||'var(--primary)'};"></div></div></div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin gastos este mes</div></div>';

  // CV chart
  const meses = [];
  const dG = [], dV = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const ini = new Date(d.getFullYear(),d.getMonth(),1);
    const fin = new Date(d.getFullYear(),d.getMonth()+1,0);
    meses.push(d.toLocaleDateString('es-MX',{month:'short'}));
    dG.push(gastos.filter(g=>{const f=new Date(g.fecha); return f>=ini&&f<=fin;}).reduce((s,g)=>s+g.monto,0));
    dV.push(ventas.filter(v=>{const f=new Date(v.fecha); return f>=ini&&f<=fin;}).reduce((s,v)=>s+v.total,0));
  }
  if (window._chCV) window._chCV.destroy();
  window._chCV = new Chart(document.getElementById('chartCV').getContext('2d'),{
    type:'bar', data:{ labels:meses, datasets:[
      { label:'Gastos', data:dG, backgroundColor:'rgba(184,56,56,.8)', borderRadius:6, barPercentage:.6 },
      { label:'Ventas', data:dV, backgroundColor:'rgba(31,107,71,.8)', borderRadius:6, barPercentage:.6 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top',align:'end',labels:{font:{family:'Inter Tight',size:12},usePointStyle:true,padding:14,boxWidth:12,boxHeight:8}}, tooltip:{backgroundColor:'#1A1612',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label}: ${mxn(c.parsed.y)}`}}},
      scales:{ x:{grid:{display:false},border:{display:false}}, y:{grid:{color:'#E8DFD0'},border:{display:false},ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K'}}}}
  });

  // Tabla
  document.getElementById('gastos-count').textContent = `${gastos.length} gasto${gastos.length===1?'':'s'} registrado${gastos.length===1?'':'s'}`;
  const tbody = document.querySelector('#tbl-gastos tbody');
  if (!gastos.length) tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-3);padding:40px;">Sin gastos</td></tr>';
  else tbody.innerHTML = gastos.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(g => {
    const lote = store.get('lotes', g.loteId)?.nombre || '—';
    return `<tr>
      <td class="num-mono" style="color:var(--text-3)">${fmtFecha(g.fecha,{short:true})}</td>
      <td style="font-weight:600">${escapeHTML(g.concepto)}</td>
      <td><span class="pill" style="background:var(--surface-3);">${escapeHTML(g.categoria)}</span></td>
      <td>${escapeHTML(lote)}</td>
      <td style="color:var(--text-3)">${escapeHTML(g.proveedor||'—')}</td>
      <td class="num-mono" style="font-weight:700;color:var(--terracotta);font-family:var(--font-display);font-size:14px;">−${mxn(g.monto)}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="eliminarGasto('${g.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');
}

function abrirNuevoGasto() {
  document.getElementById('g-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('g-lote').innerHTML = '<option value="">— Sin lote específico —</option>' + store.list('lotes',{estado:'activo'}).map(l=>`<option value="${l.id}">${l.nombre}</option>`).join('');
  ['g-concepto','g-monto','g-prov'].forEach(id=>document.getElementById(id).value='');
  openModal('modal-gasto');
}

function guardarGasto() {
  const data = {
    fecha: document.getElementById('g-fecha').value,
    categoria: document.getElementById('g-cat').value,
    concepto: document.getElementById('g-concepto').value.trim(),
    loteId: document.getElementById('g-lote').value || null,
    monto: Number(document.getElementById('g-monto').value)||0,
    proveedor: document.getElementById('g-prov').value.trim()
  };
  if (!data.concepto || !data.monto) { toast('Concepto y monto requeridos','danger'); return; }
  store.create('gastos', data);
  logActivity({ texto:`<strong>${auth.current()?.nombre||'Tú'}</strong> registró gasto · <strong>−${mxn(data.monto)}</strong>`, tipo:'r', icono:'arrow-down-right' });
  closeModal('modal-gasto');
  toast('Gasto registrado','success');
  renderPage();
}

function eliminarGasto(id) {
  if (!confirm('¿Eliminar este gasto?')) return;
  store.delete('gastos', id);
  toast('Gasto eliminado','info');
  renderPage();
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
