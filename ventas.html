<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AviGes — Ventas</title>
<link rel="stylesheet" href="shared.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div id="sidebar-mount"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="toggleSB()"><i class="ti ti-menu-2"></i></button>
      <div><div class="page-ttl">Ventas</div><div class="page-sub">Pollo en pie y cartones de huevo</div></div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn"><i class="ti ti-bell"></i></div>
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-cliente')"><i class="ti ti-users"></i> Clientes</button>
      <button class="btn btn-primary" onclick="abrirNuevaVenta()"><i class="ti ti-plus"></i> Nueva venta</button>
    </div>
  </div>
  <div class="content">
    <div class="g4" id="kpi-row"></div>
    <div class="g2">
      <div class="card delay-5">
        <div class="card-head"><div><div class="card-ttl">Ventas últimos 30 días</div><div class="card-sub" id="ventas-sub">—</div></div></div>
        <div class="card-body"><div class="chart-wrap" style="height:240px;"><canvas id="chartVentas"></canvas></div></div>
      </div>
      <div class="card delay-6">
        <div class="card-head"><div><div class="card-ttl">Top 5 clientes</div><div class="card-sub">Por volumen</div></div></div>
        <div class="card-body" id="top-clientes"></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="card-head"><div><div class="card-ttl">Historial de ventas</div><div class="card-sub" id="ventas-count">—</div></div>
        <button class="btn btn-secondary btn-sm" onclick="exportarCSV()"><i class="ti ti-download"></i> CSV</button>
      </div>
      <div style="overflow-x:auto;"><table class="tbl" id="tbl-ventas"><thead><tr><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cantidad</th><th>$/U</th><th>Total</th><th>Estado</th><th></th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-venta">
  <div class="modal" style="max-width:640px;">
    <div class="modal-head"><div><div class="modal-ttl">Nueva venta</div></div><button class="modal-close" onclick="closeModal('modal-venta')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="v-fecha"></div><div class="form-group"><label class="form-label">Cliente</label><select class="form-input" id="v-cliente"></select></div></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Producto</label><select class="form-input" id="v-tipo"><option>Pollo en pie</option><option>Huevo jumbo</option><option>Huevo extra</option><option>Huevo grande</option><option>Huevo mediano</option></select></div><div class="form-group"><label class="form-label">Lote origen</label><select class="form-input" id="v-lote"></select></div></div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Cantidad</label><input type="number" class="form-input" id="v-cant" oninput="calcTotal()" placeholder="0"></div>
        <div class="form-group"><label class="form-label">$/Unidad</label><input type="number" class="form-input" id="v-precio" step="0.01" oninput="calcTotal()" placeholder="36.00"></div>
        <div class="form-group"><label class="form-label">Total MXN</label><input type="text" class="form-input" id="v-total" readonly style="background:var(--surface-3);font-weight:700;font-family:var(--font-display);color:var(--primary);"></div>
      </div>
      <div class="form-row"><div class="form-group"><label class="form-label">Estado pago</label><select class="form-input" id="v-estado"><option>Pagado en efectivo</option><option>Pagado transferencia</option><option>Pendiente · 7 días</option><option>Pendiente · 15 días</option><option>Pendiente · 30 días</option></select></div><div class="form-group"><label class="form-label">Folio</label><input type="text" class="form-input" id="v-folio"></div></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-venta')">Cancelar</button><button class="btn btn-primary" onclick="guardarVenta()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-cliente">
  <div class="modal" style="max-width:520px;">
    <div class="modal-head"><div><div class="modal-ttl">Nuevo cliente</div></div><button class="modal-close" onclick="closeModal('modal-cliente')"><i class="ti ti-x"></i></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Nombre/Razón social</label><input type="text" class="form-input" id="c-nombre"></div>
      <div class="form-row"><div class="form-group"><label class="form-label">Contacto</label><input type="text" class="form-input" id="c-contacto"></div><div class="form-group"><label class="form-label">Teléfono</label><input type="text" class="form-input" id="c-tel"></div></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="c-email"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('modal-cliente')">Cancelar</button><button class="btn btn-primary" onclick="guardarCliente()"><i class="ti ti-check"></i> Guardar</button></div>
  </div>
</div>

<script src="db.js"></script><script src="standards.js"></script><script src="calc.js"></script>
<script src="auth.js"></script><script src="seed.js"></script><script src="shared.js"></script>
<script>
function renderPage() {
  const ventas = store.list('ventas');
  const ahora = new Date();
  const inicioMes = new Date(ahora.getFullYear(), ahora.getMonth(), 1);
  const ventasMes = ventas.filter(v => new Date(v.fecha) >= inicioMes);
  const totalMes = ventasMes.reduce((s,v) => s+v.total, 0);
  const pendiente = ventas.filter(v => v.estadoPago?.includes('Pendiente')).reduce((s,v)=>s+v.total,0);
  const clientesActivos = new Set(ventasMes.map(v => v.clienteId)).size;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-modern delay-1"><div class="ki-top"><div class="ki-icon-bg g"><i class="ti ti-cash"></i></div><span class="ki-trend up"><i class="ti ti-trending-up"></i> ${ventasMes.length}</span></div><div class="ki-label">Ingreso del mes</div><div class="ki-num num-mono">${mxn(totalMes)}<span></span></div><div class="ki-context">${ventasMes.length} venta${ventasMes.length===1?'':'s'} este mes</div></div>
    <div class="kpi-modern delay-2"><div class="ki-top"><div class="ki-icon-bg b"><i class="ti ti-receipt"></i></div><span class="ki-trend up"><i class="ti ti-list"></i></span></div><div class="ki-label">Total ventas</div><div class="ki-num num-mono">${ventas.length}<span>tickets</span></div><div class="ki-context">Promedio: <strong>${ventas.length?mxn(ventas.reduce((s,v)=>s+v.total,0)/ventas.length):'$0'}</strong></div></div>
    <div class="kpi-modern delay-3"><div class="ki-top"><div class="ki-icon-bg w"><i class="ti ti-clock"></i></div><span class="ki-trend ${pendiente?'mid':'up'}"><i class="ti ti-${pendiente?'alert-circle':'check'}"></i></span></div><div class="ki-label">Por cobrar</div><div class="ki-num num-mono">${mxn(pendiente)}<span></span></div><div class="ki-context">${ventas.filter(v=>v.estadoPago?.includes('Pendiente')).length} pendientes</div></div>
    <div class="kpi-modern delay-4"><div class="ki-top"><div class="ki-icon-bg p"><i class="ti ti-users"></i></div><span class="ki-trend up"><i class="ti ti-circle-check"></i></span></div><div class="ki-label">Clientes activos</div><div class="ki-num num-mono">${clientesActivos}<span>mes</span></div><div class="ki-context">${store.list('clientes').length} totales</div></div>`;

  // Top clientes
  const totales = {};
  ventasMes.forEach(v => { totales[v.clienteId] = (totales[v.clienteId]||0) + v.total; });
  const top = Object.entries(totales).sort((a,b) => b[1]-a[1]).slice(0,5);
  const colors = ['var(--primary)','#C8821F','#344473','#6B3F5F','#B85738'];
  document.getElementById('top-clientes').innerHTML = top.length ? top.map(([id,total],i) => {
    const c = store.get('clientes', id);
    const ini = (c?.nombre||'??').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
    const compras = ventasMes.filter(v => v.clienteId === id).length;
    return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;"><div style="width:32px;height:32px;border-radius:50%;background:${colors[i]};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;">${ini}</div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">${escapeHTML(c?.nombre||'?')}</div><div style="font-size:11px;color:var(--text-3);font-weight:500;">${compras} compras</div></div><div class="num-mono" style="font-weight:700;color:var(--primary);">${mxn(total)}</div></div>`;
  }).join('') : '<div class="empty"><div class="empty-sub">Sin ventas este mes</div></div>';

  // Ventas-sub
  document.getElementById('ventas-sub').textContent = `${ventasMes.length} ventas · ${mxn(totalMes)} en total`;
  document.getElementById('ventas-count').textContent = `${ventas.length} ventas registradas`;

  // Tabla
  const tbody = document.querySelector('#tbl-ventas tbody');
  if (!ventas.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-3);padding:40px;">Sin ventas registradas</td></tr>'; }
  else tbody.innerHTML = ventas.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(v => {
    const esPollo = v.tipo?.includes('Pollo');
    return `<tr>
      <td class="num-mono" style="color:var(--text-3)">${fmtFecha(v.fecha,{short:true})}</td>
      <td style="font-weight:600">${escapeHTML(v.cliente||'')}</td>
      <td><span class="pill ${esPollo?'pill-br':'pill-po'}"><i class="ti ti-${esPollo?'burger':'egg'}"></i> ${escapeHTML(v.tipo||'')}</span></td>
      <td class="num-mono">${num(v.cantidad)} ${escapeHTML(v.unidad||'')}</td>
      <td class="num-mono">${mxnDec(v.precioUnitario)}</td>
      <td class="num-mono" style="font-weight:700;color:var(--primary);font-family:var(--font-display);font-size:14px;">+${mxn(v.total)}</td>
      <td><span class="pill ${v.estadoPago?.includes('Pagado')?'pill-ok':'pill-warn'}"><span class="sdot ${v.estadoPago?.includes('Pagado')?'g':'w'}"></span> ${v.estadoPago?.includes('Pagado')?'Pagado':'Pendiente'}</span></td>
      <td><button class="btn btn-ghost btn-sm" onclick="eliminarVenta('${v.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');

  // Gráfica últimos 30 días
  renderChart(ventas);
}

function renderChart(ventas) {
  const dias = [], dataPollo = [], dataHuevo = [];
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const fStr = d.toISOString().slice(0,10);
    dias.push(d.getDate());
    const dayVentas = ventas.filter(v => v.fecha?.slice(0,10) === fStr);
    dataPollo.push(dayVentas.filter(v=>v.tipo?.includes('Pollo')).reduce((s,v)=>s+v.total,0));
    dataHuevo.push(dayVentas.filter(v=>v.tipo?.includes('Huevo')).reduce((s,v)=>s+v.total,0));
  }
  if (window._chV) window._chV.destroy();
  window._chV = new Chart(document.getElementById('chartVentas').getContext('2d'),{
    type:'bar', data:{ labels:dias, datasets:[
      { label:'Pollo', data:dataPollo, backgroundColor:'rgba(31,107,71,.85)', borderRadius:5, stack:'a', barPercentage:.6 },
      { label:'Huevo', data:dataHuevo, backgroundColor:'rgba(200,130,31,.85)', borderRadius:5, stack:'a', barPercentage:.6 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top',align:'end',labels:{font:{family:'Inter Tight',size:12},usePointStyle:true,padding:14,boxWidth:12,boxHeight:8}}, tooltip:{backgroundColor:'#1A1612',padding:12,cornerRadius:10,callbacks:{label:c=>` ${c.dataset.label}: ${mxn(c.parsed.y)}`}}},
      scales:{ x:{stacked:true,grid:{display:false},ticks:{font:{size:10,weight:'600'},maxTicksLimit:10}}, y:{stacked:true,grid:{color:'#E8DFD0'},border:{display:false},ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K'}}}
    }
  });
}

function abrirNuevaVenta() {
  document.getElementById('v-fecha').value = new Date().toISOString().slice(0,10);
  document.getElementById('v-cliente').innerHTML = store.list('clientes').map(c => `<option value="${c.id}">${escapeHTML(c.nombre)}</option>`).join('') + '<option value="_nuevo">+ Nuevo cliente</option>';
  document.getElementById('v-lote').innerHTML = '<option value="">— Sin lote específico —</option>' + store.list('lotes',{estado:'activo'}).map(l => `<option value="${l.id}">${l.nombre}</option>`).join('');
  document.getElementById('v-cant').value = '';
  document.getElementById('v-precio').value = '';
  document.getElementById('v-total').value = '';
  document.getElementById('v-folio').value = `F-${new Date().getFullYear()}-${String(store.list('ventas').length+1).padStart(3,'0')}`;
  openModal('modal-venta');
}

function calcTotal() {
  const c = Number(document.getElementById('v-cant').value)||0;
  const p = Number(document.getElementById('v-precio').value)||0;
  document.getElementById('v-total').value = mxn(c*p);
}

function guardarVenta() {
  const cId = document.getElementById('v-cliente').value;
  if (cId === '_nuevo') { closeModal('modal-venta'); openModal('modal-cliente'); return; }
  const cliente = store.get('clientes', cId);
  if (!cliente) { toast('Cliente requerido','danger'); return; }
  const cant = Number(document.getElementById('v-cant').value)||0;
  const precio = Number(document.getElementById('v-precio').value)||0;
  if (!cant || !precio) { toast('Cantidad y precio requeridos','danger'); return; }
  const tipo = document.getElementById('v-tipo').value;
  const data = {
    fecha: document.getElementById('v-fecha').value,
    clienteId: cId, cliente: cliente.nombre,
    tipo, loteId: document.getElementById('v-lote').value || null,
    cantidad: cant, unidad: tipo.includes('Pollo')?'kg':'ctn',
    precioUnitario: precio, total: cant*precio,
    estadoPago: document.getElementById('v-estado').value,
    folio: document.getElementById('v-folio').value
  };
  store.create('ventas', data);
  logActivity({ texto: `<strong>${auth.current()?.nombre||'Tú'}</strong> registró venta · <strong>+${mxn(data.total)}</strong>`, tipo:'g', icono:'cash' });
  closeModal('modal-venta');
  toast('Venta registrada','success');
  renderPage();
}

function guardarCliente() {
  const data = {
    nombre: document.getElementById('c-nombre').value.trim(),
    contacto: document.getElementById('c-contacto').value.trim(),
    telefono: document.getElementById('c-tel').value.trim(),
    email: document.getElementById('c-email').value.trim()
  };
  if (!data.nombre) { toast('Nombre requerido','danger'); return; }
  store.create('clientes', data);
  ['c-nombre','c-contacto','c-tel','c-email'].forEach(id => document.getElementById(id).value='');
  closeModal('modal-cliente');
  toast('Cliente agregado','success');
  abrirNuevaVenta(); // re-abrir venta con cliente nuevo
}

function eliminarVenta(id) {
  if (!confirm('¿Eliminar esta venta?')) return;
  store.delete('ventas', id);
  toast('Venta eliminada','info');
  renderPage();
}

function exportarCSV() {
  const ventas = store.list('ventas').sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  let csv = 'Fecha,Cliente,Producto,Cantidad,Unidad,$/U,Total,Estado,Folio\n';
  ventas.forEach(v => csv += `"${v.fecha}","${v.cliente}","${v.tipo}",${v.cantidad},"${v.unidad}",${v.precioUnitario},${v.total},"${v.estadoPago}","${v.folio||''}"\n`);
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `ventas-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  toast('CSV descargado','success');
}

setTimeout(renderPage, 50);
</script>
</body>
</html>
